<!--
  cta-banner.html — reusable closing call-to-action.
  Injected via <div data-include="assets/partials/cta-banner.html"></div>.
  Place inside a <section class="section"><div class="container">…</div></section>
  if you want it wrapped, or use as-is for a full-bleed band.
-->
<aside class="cta-banner" data-reveal aria-labelledby="cta-banner-title">
  <div>
    <p class="eyebrow" style="color: var(--color-sand);">Let's build together</p>
    <h2 id="cta-banner-title" class="cta-banner__title">
      Ready to grow a brand the planet can stand behind?
    </h2>
    <p class="cta-banner__lede">
      We partner with eco-conscious founders and impact-led teams to tell
      honest stories that earn trust — and sustain it.
    </p>
  </div>
  <div class="cta-banner__actions">
    <a class="btn btn--primary" href="contact.html" data-magnetic="22">
      Start a project <span class="btn__arrow" aria-hidden="true">→</span>
    </a>
    <a class="btn btn--ghost" href="services.html" data-magnetic="14">View services</a>
  </div>
</aside>
